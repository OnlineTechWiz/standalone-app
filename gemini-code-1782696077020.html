<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            background-color: #0a0a0a; /* Matte Black */
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .menu-container {
            width: 80%;
            max-width: 600px;
            border: 1px solid #33ff00; /* Neon Green Border */
            padding: 40px;
            box-shadow: 0 0 20px rgba(51, 255, 0, 0.2);
        }
        h1 { color: #33ff00; text-align: center; text-transform: uppercase; }
        .tier {
            border-bottom: 1px solid #222;
            padding: 20px 0;
        }
        .tier h2 { margin: 0; color: #ffffff; }
        .price { color: #33ff00; font-weight: bold; font-size: 1.2em; }
        .cta {
            display: block;
            text-align: center;
            margin-top: 30px;
            padding: 15px;
            background-color: #33ff00;
            color: #000;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="menu-container">
    <h1>StandardOnly7 | Systems Architect</h1>
    
    <div class="tier">
        <h2>AI Workflow Audit</h2>
        <p>Optimize your content engine in 60 minutes.</p>
        <span class="price">$150</span>
    </div>

    <div class="tier">
        <h2>Market Structure Analysis</h2>
        <p>Precision review of your current systems.</p>
        <span class="price">$150</span>
    </div>

    <div class="tier">
        <h2>System Setup Template</h2>
        <p>Plug-and-play architecture for your brand.</p>
        <span class="price">$150</span>
    </div>

    <a href="#" class="cta">Build Your Baseline</a>
</div>

</body>
</html>
